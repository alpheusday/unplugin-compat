packages:
  - ./package
  - ./test

autoInstallPeers: false
strictPeerDependencies: false

allowBuilds:
  '@swc/core': true
  esbuild: false

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  # config
  - "@apst/biome"
  - "@apst/tsconfig"
  - "@apst/tsdown"
  # tsdown
  - "@tsdown/*"
  - "tsdown"
